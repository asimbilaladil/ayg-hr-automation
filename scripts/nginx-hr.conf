# ─── AYG HR — Nginx Configuration ────────────────────────────────────────────
# Place this file at: /etc/nginx/sites-available/ayg-hr
# Then: sudo ln -sf /etc/nginx/sites-available/ayg-hr /etc/nginx/sites-enabled/ayg-hr
# Then: sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Frontend: hr.aygfoods.com → Vue SPA (pm2 serve on :3000) ─────────────────
server {
    listen 80;
    server_name hr.aygfoods.com;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hr.aygfoods.com;

    # SSL (managed by Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/hr.aygfoods.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hr.aygfoods.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to pm2 serve (Vue static SPA)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static assets aggressively; HTML never cached
        proxy_cache_bypass $http_pragma;
        add_header Cache-Control "no-cache" always;
    }
}


# ── Backend API: hr-api.aygfoods.com → Express (:3001) ───────────────────────
server {
    listen 80;
    server_name hr-api.aygfoods.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hr-api.aygfoods.com;

    ssl_certificate     /etc/letsencrypt/live/hr-api.aygfoods.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hr-api.aygfoods.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 5m;
    }
}
